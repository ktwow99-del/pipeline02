<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수주 파이프라인 정보 제안</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page">
      <header class="page-header page-header--row">
        <h1>수주 파이프라인 정보 제안</h1>
        <div class="header-employee">
          <input
            type="text"
            id="employeeIdName"
            name="employeeIdName"
            form="rating-form"
            placeholder="사번/이름"
            autocomplete="name"
            aria-label="사번/이름"
          />
        </div>
      </header>

      <form id="rating-form" class="sheet" autocomplete="on">
        <table class="grid-form">
          <colgroup>
            <col class="grid-form-col-label" />
            <col class="grid-form-col-value" />
            <col class="grid-form-col-label" />
            <col class="grid-form-col-value" />
          </colgroup>
          <tbody>
            <tr>
              <th scope="row" class="label">사업명</th>
              <td class="value full" colspan="3">
                <input type="text" name="projectName" placeholder="사업명을 입력하세요" />
              </td>
            </tr>

            <tr>
              <th scope="row" class="label">연면적</th>
              <td class="value">
                <select name="floorArea" id="floorArea" data-grade-key="floorArea">
                  <option value="">선택</option>
                  <option value="A" data-label="40,000평 이상">40,000평 이상</option>
                  <option value="B" data-label="20,000평 이상">20,000평 이상</option>
                  <option value="C" data-label="20,000평 이하">20,000평 이하</option>
                </select>
              </td>
              <th scope="row" class="label narrow" rowspan="2">입지</th>
              <td class="value split" rowspan="2">
                <div class="stack">
                  <select name="location" id="location" data-grade-key="location">
                    <option value="">선택</option>
                    <option value="A" data-label="서울">서울</option>
                    <option value="B" data-label="수도권">수도권</option>
                    <option value="B" data-label="광역시">광역시</option>
                    <option value="C" data-label="지방">지방</option>
                  </select>
                </div>
                <div class="stack bordered-top">
                  <input
                    type="text"
                    name="locationDetail"
                    id="locationDetail"
                    class="input-postcode"
                    placeholder="도로명 주소 혹은 지번 기재"
                    autocomplete="off"
                    title="클릭하면 우편번호·도로명·지번 주소를 검색합니다"
                  />
                </div>
              </td>
            </tr>
            <tr>
              <th scope="row" class="label">전략방향 정합성</th>
              <td class="value">
                <select name="strategyFit" id="strategyFit" data-grade-key="strategyFit">
                  <option value="">선택</option>
                  <option value="A" data-label="자체">자체</option>
                  <option value="B" data-label="도급">도급</option>
                  <option value="B" data-label="정비">정비</option>
                  <option value="C" data-label="지분투자">지분투자</option>
                </select>
              </td>
            </tr>

            <tr>
              <th scope="row" class="label">상품 종류</th>
              <td class="value">
                <select name="strategyDirection" id="strategyDirection" data-grade-key="strategyDirection">
                  <option value="">선택</option>
                  <option value="A" data-label="공동주택">공동주택</option>
                  <option value="B" data-label="오피스텔">오피스텔</option>
                  <option value="B" data-label="데이터센터">데이터센터</option>
                  <option value="B" data-label="오피스">오피스</option>
                  <option value="C" data-label="주상복합">주상복합</option>
                  <option value="C" data-label="기타">기타</option>
                </select>
              </td>
              <th scope="row" class="label narrow">대지 면적</th>
              <td class="value">
                <input type="text" name="siteArea" placeholder="대지 면적" />
              </td>
            </tr>

            <tr>
              <th scope="row" class="label">발주처</th>
              <td class="value">
                <input type="text" name="client" placeholder="발주처" />
              </td>
              <th scope="row" class="label narrow">입찰방식</th>
              <td class="value">
                <input type="text" name="biddingMethod" placeholder="입찰방식" />
              </td>
            </tr>

            <tr>
              <th scope="row" class="label">협의처</th>
              <td class="value">
                <input type="text" name="consultation" placeholder="협의처" />
              </td>
              <th scope="row" class="label narrow">설계사 / 감리(CM)</th>
              <td class="value">
                <input type="text" name="architectCm" placeholder="설계사 / 감리(CM)" />
              </td>
            </tr>

            <tr>
              <th scope="row" class="label">금융구도</th>
              <td class="value">
                <input type="text" name="finance" placeholder="금융구도" />
              </td>
              <th scope="row" class="label narrow">사업예산</th>
              <td class="value">
                <input type="text" name="budget" placeholder="사업예산" />
              </td>
            </tr>

            <tr>
              <th scope="row" class="label">경쟁사</th>
              <td class="value">
                <input type="text" name="competitor" placeholder="경쟁사" />
              </td>
              <th scope="row" class="label narrow">수주 가능성</th>
              <td class="value">
                <select name="orderPossibility" id="orderPossibility" data-grade-key="orderPossibility">
                  <option value="">선택</option>
                  <option value="A" data-label="A">A</option>
                  <option value="B" data-label="B">B</option>
                  <option value="C" data-label="C">C</option>
                </select>
              </td>
            </tr>

            <tr class="notes-row">
              <th scope="row" class="label vertical">
                <span>특이사항 / 진행현황 / Key Partner</span>
              </th>
              <td class="value full notes" colspan="3">
                <textarea name="notes" rows="8" placeholder="특이사항, 진행현황, Key Partner 등을 입력하세요"></textarea>
              </td>
            </tr>

            <tr class="attachments-row">
              <th scope="row" class="label">첨부파일</th>
              <td class="value full" colspan="3">
                <div class="attachments-wrap">
                  <input
                    type="file"
                    id="attachmentFiles"
                    name="attachmentFiles"
                    class="attachment-input"
                    multiple
                  />
                  <button type="button" class="ghost attachment-trigger" id="btn-attachment">
                    첨부파일
                  </button>
                  <div class="attachment-names" id="attachmentNames" aria-live="polite"></div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>

        <aside class="grades-panel" aria-labelledby="admin-panel-title">
          <div class="admin-head">
            <h2 id="admin-panel-title">관리자</h2>
            <div class="admin-head-actions no-print">
              <button type="button" class="ghost btn-admin-sm" id="btn-admin-expand">펼치기</button>
              <button type="button" class="ghost btn-admin-sm" id="btn-admin-collapse" hidden>접기</button>
            </div>
          </div>
          <div class="admin-password-block no-print" id="adminPasswordBlock" hidden>
            <div class="admin-password-row">
              <label for="adminPassword">비밀번호</label>
              <input type="password" id="adminPassword" class="admin-password-input" autocomplete="off" />
            </div>
            <p class="admin-password-error" id="adminPasswordError" hidden role="alert"></p>
            <div class="admin-password-actions">
              <button type="button" class="primary btn-admin-sm" id="btn-admin-unlock">확인</button>
              <button type="button" class="ghost btn-admin-sm" id="btn-admin-cancel">취소</button>
            </div>
          </div>
          <div class="admin-content" id="adminGradeContent" hidden aria-live="polite">
            <div class="summary" id="grade-summary"></div>
            <div class="admin-export-row no-print">
              <button type="button" class="ghost btn-admin-sm" id="btn-ledger-export">
                누적엑셀 다운로드
              </button>
              <button type="button" class="ghost btn-admin-sm" id="btn-receipt-status">
                접수 현황
              </button>
            </div>
          </div>
        </aside>

        <div class="actions no-print">
          <button type="button" class="ghost" id="btn-reset">초기화</button>
          <button type="button" class="ghost" id="btn-ledger-save">저장</button>
          <span class="ledger-status" id="ledger-status" aria-live="polite"></span>
          <button type="button" class="primary" id="btn-pdf">PDF 출력</button>
        </div>
      </form>
    </div>

    <div class="receipt-modal no-print" id="receiptModal" hidden>
      <div class="receipt-modal-inner">
        <div class="receipt-modal-backdrop" id="receiptModalBackdrop" aria-hidden="true"></div>
        <div class="receipt-modal-panel" role="dialog" aria-modal="true" aria-labelledby="receiptModalTitle">
          <div class="receipt-modal-head">
            <h3 id="receiptModalTitle">접수 현황</h3>
            <button type="button" class="ghost btn-admin-sm" id="btnReceiptModalClose">닫기</button>
          </div>
          <div class="receipt-modal-body" id="receiptModalBody"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script src="app.js"></script>
  </body>
</html>
